name: Build and Release NT MIDI Router Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install ARM toolchain
        run: |
          brew update
          brew install --cask gcc-arm-embedded

      - name: Verify installation
        run: |
          arm-none-eabi-g++ --version

      - name: Build plugin
        run: |
          make clean
          make hardware

      - name: Prepare release archive
        run: |
          mkdir -p release/programs/plug-ins
          cp plugins/nt_midi_router.o release/programs/plug-ins/
          cd release
          zip -r ../nt_midi_router-plugin.zip programs
          cd ..
          echo "Created zip contents:"
          unzip -l nt_midi_router-plugin.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nt_midi_router-plugin.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
